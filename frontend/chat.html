<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat - Smart Complaint System</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .layout { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(0,5,30,0.95); backdrop-filter: blur(20px); border-right: 1px solid var(--border-neon); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0,200,255,0.15); display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: bold; }
        
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { height: 70px; border-bottom: 1px solid rgba(0,200,255,0.2); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; background: rgba(0,0,0,0.5); }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; position: relative; animation: fade-in-up 0.3s ease; }
        .msg-left { align-self: flex-start; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .msg-right { align-self: flex-end; background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(123,47,255,0.1)); border: 1px solid var(--border-neon); border-bottom-right-radius: 4px; }
        
        .msg-sender { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .msg-text { color: white; line-height: 1.4; }
        .msg-time { font-size: 0.65rem; color: var(--text-muted); text-align: right; margin-top: 4px; }
        
        .chat-input-area { padding: 20px 24px; border-top: 1px solid rgba(0,200,255,0.2); background: rgba(0,0,0,0.8); display: flex; gap: 12px; }
        .chat-input { flex: 1; background: var(--bg-card); border: 1px solid var(--border-neon); border-radius: 24px; padding: 12px 20px; color: white; font-family: 'Inter'; outline: none; transition: 0.3s; }
        .chat-input:focus { box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        .btn-send { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(0,212,255,0.5); }
        
        /* Contact List */
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
        .contact-item:hover { background: rgba(0,212,255,0.05); }
        .contact-item.active { background: rgba(0,212,255,0.1); border-left: 4px solid var(--neon-cyan); }
        
    </style>
    <!-- Include Socket.io CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header" style="justify-content: space-between;">
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="btn-outline" style="padding: 4px 8px;" onclick="window.history.back()">←</button>
                <div style="font-weight: bold; font-family:'Orbitron';">SECURE CHAT</div>
            </div>
        </div>
        <div class="contact-list" id="contactList">
            <!-- Active complaints mapped as rooms -->
        </div>
    </aside>

    <main class="chat-container">
        <header class="chat-header">
            <div>
                <h3 id="roomTitle">Select a chat</h3>
                <div class="muted" style="font-size: 0.8rem;" id="roomSubtitle"></div>
            </div>
            <div style="color: #00ff88; font-size: 0.8rem; display:flex; align-items:center; gap:8px;">
                <div style="width:8px; height:8px; background:#00ff88; border-radius:50%;" class="animate-pulse-neon"></div>
                E2E Encrypted
            </div>
        </header>

        <div class="chat-messages" id="messages">
            <div style="text-align:center; color:var(--text-muted); margin-top:auto; margin-bottom:auto;">
                Please select a complaint to view messages
            </div>
        </div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" class="chat-input" id="msgInput" placeholder="Type a secure message..." disabled>
            <button type="submit" class="btn-send" id="sendBtn" disabled>➤</button>
        </form>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
    if (!localStorage.getItem('scs_token')) { window.location.href = 'login.html'; }
    
    const user = JSON.parse(localStorage.getItem('scs_user'));
    let currentRoom = null;
    let socket = null;

    async function initChat() {
        // Initialize Socket
        socket = io({
            auth: { token: localStorage.getItem('scs_token') }
        });

        socket.on('connect', () => console.log('Socket connected'));
        
        socket.on('message', (msg) => {
            if (msg.roomId === currentRoom) {
                appendMessage(msg);
                scrollToBottom();
            }
        });

        socket.on('status', (data) => {
            console.log(data.msg);
        });

        // Load rooms (complaints)
        try {
            let complaints = [];
            if (user.role === 'admin') {
                complaints = await apiCall('/admin/complaints');
            } else {
                complaints = await apiCall('/complaints?limit=20');
            }
            
            const list = document.getElementById('contactList');
            list.innerHTML = '';
            
            // Add AI Assistant as first contact
            const aiDiv = document.createElement('div');
            aiDiv.className = 'contact-item active';
            aiDiv.innerHTML = `
                <div class="avatar" style="width:36px; height:36px; font-size:0.8rem; background: var(--neon-cyan);">🤖</div>
                <div>
                    <div style="font-weight:bold; font-size:0.9rem;">SCS AI Assistant</div>
                    <div class="muted" style="font-size:0.75rem;">Always Online</div>
                </div>
            `;
            aiDiv.onclick = () => {
                document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                aiDiv.classList.add('active');
                currentRoom = 'AI_ASSISTANT';
                setupAIRoom();
            };
            list.appendChild(aiDiv);

            complaints.forEach(c => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `
                    <div class="avatar" style="width:36px; height:36px; font-size:0.8rem;">C</div>
                    <div>
                        <div style="font-weight:bold; font-size:0.9rem;">${c.complaintId}</div>
                        <div class="muted" style="font-size:0.75rem;">${c.category}</div>
                    </div>
                `;
                div.onclick = () => {
                    document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    joinRoom(c.complaintId);
                };
                list.appendChild(div);
            });
            
        } catch(e) {
            showToast('Failed to load chats', 'error');
        }
    }

    }

    function setupAIRoom() {
        document.getElementById('roomTitle').innerText = 'SCS AI Assistant';
        document.getElementById('roomSubtitle').innerText = 'Ask me anything about the platform';
        document.getElementById('messages').innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-bottom:16px;">AI Support Session Started</div>';
        
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        
        appendMessage({
            senderId: 'AI',
            senderName: 'SCS Bot',
            text: 'Hello! I am your Smart Complaint Assistant. How can I help you today?',
            timestamp: new Date()
        });
    }

    function joinRoom(roomId) {
        if (currentRoom) {
            socket.emit('leave', { room: currentRoom });
        }
        currentRoom = roomId;
        socket.emit('join', { room: currentRoom });
        
        document.getElementById('roomTitle').innerText = roomId;
        document.getElementById('roomSubtitle').innerText = 'Connected with assigned officer';
        document.getElementById('messages').innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-bottom:16px;">End-to-End Encrypted Session Started</div>';
        
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        
        // In real app, fetch message history here via API
    }

    function appendMessage(msg) {
        const isMe = msg.senderId === user.id;
        const div = document.createElement('div');
        div.className = `msg-bubble ${isMe ? 'msg-right' : 'msg-left'}`;
        
        const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        div.innerHTML = `
            ${!isMe ? `<div class="msg-sender">${msg.senderName}</div>` : ''}
            <div class="msg-text">${escapeHtml(msg.text)}</div>
            <div class="msg-time">${timeStr}</div>
        `;
        document.getElementById('messages').appendChild(div);
    }

    function scrollToBottom() {
        const msgs = document.getElementById('messages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    document.getElementById('chatForm').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !currentRoom) return;
        
        appendMessage({
            senderId: user.id,
            senderName: user.fullName,
            text: text,
            timestamp: new Date()
        });

        if (currentRoom === 'AI_ASSISTANT') {
            handleAIChat(text);
        } else {
            socket.emit('message', {
                room: currentRoom,
                senderId: user.id,
                senderName: user.fullName,
                text: text
            });
        }
        
        input.value = '';
    };

    async function handleAIChat(query) {
        try {
            const res = await apiCall('/ai/chat', { method: 'POST', body: JSON.stringify({ query }) });
            appendMessage({
                senderId: 'AI',
                senderName: res.senderName,
                text: res.response,
                timestamp: new Date()
            });
            scrollToBottom();
        } catch(e) { console.error(e); }
    }

    initChat();
</script>
</body>
</html>
